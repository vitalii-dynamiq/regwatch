services:
  db:
    image: postgres:17.2
    container_name: regwatch_db
    ports:
      - "5442:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: regwatch
      POSTGRES_INITDB_ARGS: "-E UTF8"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d regwatch"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: regwatch_redis
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: ./api
    container_name: regwatch_api
    command: ["sh", "-c", "alembic upgrade head && python server.py"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      ENV: local
      DEBUG: "true"
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "8080"
      DB_URL: postgresql+asyncpg://postgres:postgres@db:5432/regwatch
      REDIS_ENABLED: "true"
      REDIS_URL: redis://redis:6379/0
      TASKIQ_ENABLED: "true"
      TASKIQ_ADMIN_URL: ""
      TASKIQ_ADMIN_API_TOKEN: "local-dev-token"
    env_file:
      - .env
    restart: unless-stopped

  taskiq_worker:
    build:
      context: ./api
    container_name: regwatch_taskiq_worker
    command: [
      "taskiq", "worker", "app.taskiq.broker:broker",
      "--workers", "2",
      "--max-async-tasks", "20",
    ]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ENV: local
      DB_URL: postgresql+asyncpg://postgres:postgres@db:5432/regwatch
      REDIS_ENABLED: "true"
      REDIS_URL: redis://redis:6379/0
      TASKIQ_ENABLED: "true"
      TASKIQ_ADMIN_URL: ""
      TASKIQ_ADMIN_API_TOKEN: "local-dev-token"
      PYTHONUNBUFFERED: "1"
    env_file:
      - .env
    restart: unless-stopped

  taskiq_scheduler:
    build:
      context: ./api
    container_name: regwatch_taskiq_scheduler
    command: ["taskiq", "scheduler", "app.taskiq.schedulers.cron:scheduler"]
    depends_on:
      db:
        condition: service_healthy
      taskiq_worker:
        condition: service_started
    environment:
      ENV: local
      DB_URL: postgresql+asyncpg://postgres:postgres@db:5432/regwatch
      REDIS_ENABLED: "true"
      REDIS_URL: redis://redis:6379/0
      TASKIQ_ENABLED: "true"
      TASKIQ_ADMIN_URL: ""
      TASKIQ_ADMIN_API_TOKEN: "local-dev-token"
      PYTHONUNBUFFERED: "1"
    env_file:
      - .env
    restart: unless-stopped

  ui:
    build:
      context: ./ui
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3000
        NEXT_PUBLIC_USE_API_PROXY: "true"
        NEXT_PUBLIC_API_PROXY_PREFIX: http://localhost:3000/api/proxy
        NEXT_PUBLIC_WEBFLOW_SITE: ${WEBFLOW_SITE:-https://example.com}
        NEXT_PUBLIC_NODE_ENV: development
        NEXT_PUBLIC_REFERRER_POLICY: no-referrer
    container_name: regwatch_ui
    depends_on:
      - api
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      API_URL: http://api:8080
      AUTH_TRUST_HOST: "true"
    env_file:
      - .env
    restart: unless-stopped

volumes:
  db-data:
  redis-data:
